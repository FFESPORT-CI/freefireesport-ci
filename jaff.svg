<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#ffaa00"/>
      <stop offset="100%" style="stop-color:#ff8c00"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a18"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond -->
  <circle cx="100" cy="100" r="100" fill="url(#darkGrad)"/>

  <!-- Anneau extérieur doré -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#goldGrad)" stroke-width="3" opacity="0.8"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.3"/>

  <!-- Diamant central -->
  <polygon points="100,28 138,70 100,112 62,70" fill="url(#goldGrad)" opacity="0.15"/>
  <polygon points="100,28 138,70 100,112 62,70" fill="none" stroke="url(#goldGrad)" stroke-width="2" filter="url(#glow)"/>

  <!-- Lignes internes du diamant -->
  <line x1="100" y1="28" x2="100" y2="112" stroke="#ffd700" stroke-width="1" opacity="0.4"/>
  <line x1="62" y1="70" x2="138" y2="70" stroke="#ffd700" stroke-width="1" opacity="0.4"/>
  <line x1="100" y1="28" x2="62" y2="70" stroke="#ffd700" stroke-width="0.5" opacity="0.3"/>
  <line x1="100" y1="28" x2="138" y2="70" stroke="#ffd700" stroke-width="0.5" opacity="0.3"/>

  <!-- Texte JAFF -->
  <text x="100" y="152" 
        font-family="'Arial Black', sans-serif" 
        font-size="32" 
        font-weight="900"
        fill="url(#goldGrad)" 
        text-anchor="middle"
        letter-spacing="6"
        filter="url(#glow)">JAFF</text>

  <!-- Sous-texte -->
  <text x="100" y="172" 
        font-family="Arial, sans-serif" 
        font-size="9" 
        fill="#ffaa00"
        text-anchor="middle"
        letter-spacing="3"
        opacity="0.8">E-SHOP</text>

  <!-- Points décoratifs -->
  <circle cx="52" cy="70" r="3" fill="#ffd700" opacity="0.6" filter="url(#glow)"/>
  <circle cx="148" cy="70" r="3" fill="#ffd700" opacity="0.6" filter="url(#glow)"/>
  <circle cx="100" cy="22" r="3" fill="#ffd700" opacity="0.6" filter="url(#glow)"/>
  <circle cx="100" cy="118" r="3" fill="#ffd700" opacity="0.6" filter="url(#glow)"/>

  <!-- Petits diamants déco sur l'anneau -->
  <polygon points="100,8 103,12 100,16 97,12" fill="#ffd700" opacity="0.8"/>
  <polygon points="192,100 196,103 192,106 188,103" fill="#ffd700" opacity="0.8"/>
  <polygon points="8,100 12,103 8,106 4,103" fill="#ffd700" opacity="0.8"/>
  <polygon points="100,184 103,188 100,192 97,188" fill="#ffd700" opacity="0.8"/>
</svg>
